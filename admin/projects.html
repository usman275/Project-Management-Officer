<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Projects — Project Management Admin</title>
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/student.css" />
    <link rel="stylesheet" href="../styles/admin.css" />
</head>

<body>
    <div class="portal-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo-icon">🏛️</div>
                <div class="sidebar-logo-text">Project Management<span>Admin Panel</span></div>
            </div>
            <nav class="sidebar-nav">
                <span class="sidebar-section-label">Dashboard</span>
                <a href="dashboard.html" class="sidebar-link"><span class="nav-icon">📊</span> Overview</a>
                <span class="sidebar-section-label">Management</span>
                <a href="users.html" class="sidebar-link"><span class="nav-icon">👥</span> Manage Users</a>
                <a href="projects.html" class="sidebar-link active"><span class="nav-icon">📁</span> Manage
                    Projects</a>
                <a href="departments.html" class="sidebar-link"><span class="nav-icon">🏫</span> Departments &
                    Batches</a>
                <a href="announcements.html" class="sidebar-link"><span class="nav-icon">📢</span>
                    Announcements</a>
                <span class="sidebar-section-label">System</span>
                <a href="settings.html" class="sidebar-link"><span class="nav-icon">⚙️</span> Settings</a>
                <a href="#" class="sidebar-link" onclick="Auth.adminLogout()"><span class="nav-icon">🚪</span>
                    Logout</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar avatar-sm"
                        style="background:linear-gradient(135deg,#b8770c,#f5b93e);color:#1a1000">AD</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name" id="sidebar-user-name">Admin</div>
                        <div class="sidebar-user-role" id="sidebar-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="portal-main">
            <div class="portal-topbar admin-topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle">☰</button>
                    <div>
                        <div class="topbar-title">Manage Projects</div>
                        <div class="topbar-subtitle" id="pending-notice"></div>
                    </div>
                </div>
            </div>

            <div class="portal-content">
                <div class="filter-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search" placeholder="Search by title, author, supervisor, tags…" />
                    </div>
                    <select class="filter-select" id="dept-filter">
                        <option value="">All Departments</option>
                    </select>
                    <select class="filter-select" id="batch-filter">
                        <option value="">All Batches</option>
                    </select>
                    <select class="filter-select" id="status-filter">
                        <option value="">All Status</option>
                        <option value="pending">⏳ Pending</option>
                        <option value="approved">✅ Approved</option>
                        <option value="rejected">❌ Rejected</option>
                    </select>
                </div>

                <div
                    style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);flex-wrap:wrap;gap:var(--space-3)">
                    <span id="result-count" style="font-size:.875rem;color:var(--gray-500)"></span>
                    <select class="filter-select" id="sort-select" style="min-width:160px">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="az">A–Z</option>
                    </select>
                </div>

                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Project Title</th>
                                <th>Author</th>
                                <th>Department</th>
                                <th>Batch</th>
                                <th>Status</th>
                                <th>Views</th>
                                <th>Submitted</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="projects-tbody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        if (!requireAdmin()) throw new Error('not admin');
        initSidebar();
        initTopbar('admin');

        const pendingCount = Projects.pending().length;
        if (pendingCount > 0) {
            document.getElementById('pending-notice').innerHTML = `<span style="color:var(--warning-500)">⏳ ${pendingCount} project${pendingCount !== 1 ? 's' : ''} awaiting review</span>`;
        }

        // Filters
        const deptSel = document.getElementById('dept-filter');
        Departments.all().forEach(d => { const o = document.createElement('option'); o.value = d.name; o.textContent = d.name; deptSel.appendChild(o); });
        const batchSel = document.getElementById('batch-filter');
        [...Batches.all()].reverse().forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b + ' Cohort'; batchSel.appendChild(o); });

        let currentPage = 1;

        function getFiltered() {
            const q = document.getElementById('search').value.trim();
            const dept = document.getElementById('dept-filter').value;
            const Cohort = document.getElementById('batch-filter').value;
            const status = document.getElementById('status-filter').value;
            let results = Projects.search(q, dept, Cohort, status || undefined);
            const sort = document.getElementById('sort-select').value;
            if (sort === 'newest') results.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            else if (sort === 'oldest') results.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            else if (sort === 'az') results.sort((a, b) => a.title.localeCompare(b.title));
            return results;
        }

        function render() {
            const all = getFiltered();
            const pager = paginate(all, currentPage, 10);
            document.getElementById('result-count').textContent = `${all.length} project${all.length !== 1 ? 's' : ''} found`;

            const tbody = document.getElementById('projects-tbody');
            if (!pager.items.length) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state" style="padding:40px 0">
        <div class="empty-icon">📁</div><h3>No Projects Found</h3></div></td></tr>`;
            } else {
                tbody.innerHTML = pager.items.map(p => `
        <tr>
          <td>
            <div style="font-weight:600;color:var(--white);font-size:.875rem;max-width:300px">${escapeHtml(truncate(p.title, 65))}</div>
            <div style="font-size:.72rem;color:var(--gray-600);margin-top:2px">${(p.tags || []).slice(0, 3).map(t => `<span class="project-tag" style="font-size:.62rem">${escapeHtml(t)}</span>`).join(' ')}</div>
          </td>
          <td>
            <div style="font-size:.875rem;color:var(--gray-300)">${escapeHtml(p.authorName)}</div>
            <div style="font-size:.75rem;color:var(--gray-600)">Sup: ${escapeHtml(p.supervisor)}</div>
          </td>
          <td style="font-size:.82rem">${escapeHtml(p.department)}</td>
          <td><span class="badge badge-primary">${escapeHtml(p.batch)}</span></td>
          <td>${statusBadge(p.status)}</td>
          <td><span style="font-size:.8rem">👁 ${p.views || 0}</span></td>
          <td style="font-size:.8rem;color:var(--gray-500)">${formatDate(p.createdAt)}</td>
          <td>
            <div class="action-cell">
              <button class="action-btn view"    onclick="viewProject('${p.id}')" title="View">👁</button>
              ${p.status !== 'approved' ? `<button class="action-btn approve" onclick="approveProject('${p.id}')" title="Approve">✅</button>` : ''}
              ${p.status !== 'rejected' ? `<button class="action-btn reject"  onclick="rejectProject('${p.id}')" title="Reject">❌</button>` : ''}
              <button class="action-btn delete" onclick="deleteProject('${p.id}')" title="Delete">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
            }
            renderPagination(pager, 'pagination', pg => { currentPage = pg; render(); });
        }

        function viewProject(id) {
            const p = Projects.get(id);
            showModal(`📄 ${p.title}`, `
      <div style="margin-bottom:var(--space-4)">
        <div style="font-size:.75rem;color:var(--accent-400);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">${escapeHtml(p.department)} — ${escapeHtml(p.batch)} Cohort</div>
        <h3 style="font-size:1.1rem;margin-bottom:var(--space-3)">${escapeHtml(p.title)}</h3>
        <div style="display:flex;flex-wrap:wrap;gap:var(--space-3);font-size:.82rem;color:var(--gray-400);margin-bottom:var(--space-3)">
          <span>👨‍🏫 ${escapeHtml(p.supervisor)}</span>
          <span>👤 ${escapeHtml(p.authorName)}</span>
          <span>📅 ${formatDate(p.createdAt)}</span>
          <span>👁 ${p.views || 0} views</span>
          ${statusBadge(p.status)}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--space-4)">
          ${(p.tags || []).map(t => `<span class="project-tag">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>
      <div class="divider"></div>
      <h4 style="font-size:.875rem;margin-bottom:var(--space-3)">Abstract</h4>
      <p style="font-size:.875rem;color:var(--gray-400);line-height:1.7">${escapeHtml(p.abstract)}</p>
      ${p.githubUrl ? `<div class="divider"></div><a href="${escapeHtml(p.githubUrl)}" target="_blank" class="btn btn-outline btn-sm">⚙️ View GitHub</a>` : ''}
    `, {
                size: 'lg',
                footerHtml: `
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        ${p.status !== 'approved' ? `<button class="btn btn-success" onclick="approveProject('${id}');closeModal()">✅ Approve</button>` : ''}
        ${p.status !== 'rejected' ? `<button class="btn btn-danger" onclick="rejectProject('${id}');closeModal()">❌ Reject</button>` : ''}
      `
            });
        }

        function approveProject(id) {
            Projects.approve(id);
            showToast('Project approved and published!', 'success');
            render();
        }

        function rejectProject(id) {
            Projects.reject(id);
            showToast('Project rejected.', 'warning');
            render();
        }

        function deleteProject(id) {
            const p = Projects.get(id);
            showConfirm('Delete Project', `Permanently delete "${truncate(p.title, 50)}"?`,
                () => { Projects.delete(id); showToast('Project deleted.', 'success'); render(); },
                { danger: true }
            );
        }

        ['search', 'dept-filter', 'batch-filter', 'status-filter', 'sort-select'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => { currentPage = 1; render(); });
            document.getElementById(id).addEventListener('change', () => { currentPage = 1; render(); });
        });

        render();
    </script>
</body>

</html>
