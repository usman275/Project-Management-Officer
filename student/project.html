<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail — Management</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/student.css" />
</head>

<body>
  <div class="portal-layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">🎓</div>
        <div class="sidebar-logo-text">Management<span>Employee Portal</span></div>
      </div>
      <nav class="sidebar-nav">
        <span class="sidebar-section-label">Navigation</span>
        <a href="dashboard.html" class="sidebar-link"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="browse.html" class="sidebar-link active"><span class="nav-icon">🔍</span> Browse Projects</a>
        <a href="upload.html" class="sidebar-link"><span class="nav-icon">📤</span> Upload Project</a>
        <a href="my-projects.html" class="sidebar-link"><span class="nav-icon">📁</span> My Projects</a>
        <span class="sidebar-section-label">Account</span>
        <a href="profile.html" class="sidebar-link"><span class="nav-icon">👤</span> My Profile</a>
        <a href="#" class="sidebar-link" onclick="Auth.logout()"><span class="nav-icon">🚪</span> Logout</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar avatar-sm" id="topbar-avatar"
            style="background:linear-gradient(135deg,#3b52d4,#6b7ff5);cursor:pointer"
            onclick="location.href='profile.html'" title="View Profile">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-user-name">Loading…</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Employee</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="portal-main">
      <div class="portal-topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle">☰</button>
          <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
        </div>
        <div class="topbar-right" id="topbar-actions"></div>
      </div>

      <div class="portal-content" id="project-content">
        <!-- skeleton -->
        <div class="skeleton" style="height:200px;border-radius:var(--radius-xl);margin-bottom:var(--space-5)">
        </div>
        <div class="skeleton" style="height:400px;border-radius:var(--radius-lg)"></div>
      </div>
    </main>
  </div>
  <div id="toast-container"></div>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    if (!requireStudent()) throw new Error('not logged in');
    initSidebar();
    initTopbar('employee');

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const project = id ? Projects.get(id) : null;

    if (!project) {
      document.getElementById('project-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">❌</div>
        <h3>Project Not Found</h3>
        <p>This project may have been removed or the link is invalid.</p>
        <a href="browse.html" class="btn btn-primary">Browse Projects</a>
      </div>`;
    } else {
      // Record view
      Projects.incrementView(id);
      const p = Projects.get(id); // refreshed

      // Topbar actions
      const isLiked = Projects.isLiked(id);
      document.getElementById('topbar-actions').innerHTML = `
      <button class="btn btn-ghost btn-sm" id="like-btn" onclick="toggleLike()">
        ${isLiked ? '❤️' : '🤍'} <span id="like-count">${p.likes || 0}</span>
      </button>
      ${p.githubUrl ? `<a href="${escapeHtml(p.githubUrl)}" target="_blank" rel="noopener" class="btn btn-ghost btn-sm">⚙️ GitHub</a>` : ''}
    `;

      document.getElementById('project-content').innerHTML = `
      <div class="project-detail-header">
        <div class="project-detail-dept">${escapeHtml(p.department)} — ${escapeHtml(p.batch)} Cohort</div>
        <h1 class="project-detail-title">${escapeHtml(p.title)}</h1>
        <div class="project-detail-meta">
          <div><span>👨‍🏫</span><span>Supervisor: <strong>${escapeHtml(p.supervisor)}</strong></span></div>
          <div><span>👤</span><span>By: <strong>${escapeHtml(p.authorName)}</strong></span></div>
          <div><span>📅</span><span>${formatDate(p.createdAt)}</span></div>
          <div><span>👁</span><span>${p.views || 0} views</span></div>
          <div>${statusBadge(p.status)}</div>
        </div>
        <div class="project-tags" style="margin-top:var(--space-4)">
          ${(p.tags || []).map(t => `<span class="project-tag">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>

      <div class="project-detail-body">
        <div>
          <div class="card" style="margin-bottom:var(--space-5)">
            <div class="card-header"><h3 style="font-size:1rem;font-weight:700">📝 Abstract</h3></div>
            <div class="card-body">
              <p class="project-abstract">${escapeHtml(p.abstract)}</p>
            </div>
          </div>

          ${p.pdfData ? `
          <div class="pdf-viewer-container">
            <div class="pdf-viewer-header">
              <span>📄 Project Documentation</span>
              <span style="color:var(--gray-500);font-size:.8rem">${escapeHtml(p.pdfName || 'document.pdf')}</span>
            </div>
            <iframe class="pdf-viewer-frame" src="${p.pdfData}" title="Project PDF"></iframe>
          </div>
          ` : `
          <div style="background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);border-radius:var(--radius-lg);padding:60px;text-align:center;color:var(--gray-600)">
            <div style="font-size:2.5rem;margin-bottom:var(--space-3)">📄</div>
            <p>No PDF documentation uploaded for this project.</p>
          </div>
          `}
        </div>

        <div class="project-sidebar-info">
          <div class="card">
            <div class="card-header"><h3 style="font-size:.875rem;font-weight:700">Project Details</h3></div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:var(--space-3)">
              <div style="font-size:.84rem">
                <div style="color:var(--gray-500);margin-bottom:3px">Department</div>
                <div style="color:var(--white);font-weight:600">${escapeHtml(p.department)}</div>
              </div>
              <div style="font-size:.84rem">
                <div style="color:var(--gray-500);margin-bottom:3px">Year</div>
                <div style="color:var(--white);font-weight:600">${escapeHtml(p.batch)}</div>
              </div>
              <div style="font-size:.84rem">
                <div style="color:var(--gray-500);margin-bottom:3px">Supervisor</div>
                <div style="color:var(--white);font-weight:600">${escapeHtml(p.supervisor)}</div>
              </div>
              <div style="font-size:.84rem">
                <div style="color:var(--gray-500);margin-bottom:3px">Submitted By</div>
                <div style="color:var(--white);font-weight:600">${escapeHtml(p.authorName)}</div>
              </div>
              <div style="font-size:.84rem">
                <div style="color:var(--gray-500);margin-bottom:3px">Submitted On</div>
                <div style="color:var(--white);font-weight:600">${formatDate(p.createdAt)}</div>
              </div>
              <div style="font-size:.84rem">
                <div style="color:var(--gray-500);margin-bottom:3px">Status</div>
                ${statusBadge(p.status)}
              </div>
            </div>
          </div>

          ${p.githubUrl ? `
          <a href="${escapeHtml(p.githubUrl)}" target="_blank" rel="noopener" class="btn btn-outline btn-full">
            ⚙️ View GitHub Repository
          </a>` : ''}

          <div class="card">
            <div class="card-body" style="text-align:center">
              <div style="font-size:1.5rem;font-weight:800;color:var(--white)">${p.views || 0}</div>
              <div style="font-size:.8rem;color:var(--gray-500)">Total Views</div>
              <div class="divider" style="margin:12px 0"></div>
              <div style="font-size:1.5rem;font-weight:800;color:var(--white)">${p.likes || 0}</div>
              <div style="font-size:.8rem;color:var(--gray-500)">Likes</div>
            </div>
          </div>

          <div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.12);border-radius:var(--radius-md);padding:var(--space-4)">
            <div style="font-size:.78rem;color:var(--gray-500);line-height:1.5">
              🔒 <strong style="color:var(--gray-400)">Read-Only Access</strong><br>
              This project is protected. You can read and learn from it, but editing or copying are not permitted.
            </div>
          </div>
        </div>
      </div>
    `;
    }

    function toggleLike() {
      const added = Projects.toggleLike(id);
      const p = Projects.get(id);
      const btn = document.getElementById('like-btn');
      btn.innerHTML = `${added ? '❤️' : '🤍'} <span id="like-count">${p.likes || 0}</span>`;
      showToast(added ? 'Added to your likes!' : 'Removed from likes.', 'info', 2000);
    }
  </script>
</body>

</html>
